<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Venture Local — Reset password</title>
  <style>
    :root {
      --burgundy: #722f37;
      --gold: #c89b3c;
      --cream: #f5e9d3;
      --ink: #2c241c;
      --paper: #faf6ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      background: linear-gradient(160deg, var(--cream) 0%, #e8dfd0 100%);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--paper);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(44, 36, 28, 0.12), 0 0 0 1px rgba(114, 47, 55, 0.08);
      padding: 32px 28px 36px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .brand svg { flex-shrink: 0; }
    .brand h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--burgundy);
      letter-spacing: 0.02em;
    }
    .brand p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: #5c5348;
      font-family: system-ui, -apple-system, sans-serif;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b5d4f;
      margin-bottom: 6px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(114, 47, 55, 0.35);
      font-size: 1rem;
      margin-bottom: 16px;
      background: #fff;
    }
    input:focus {
      outline: none;
      border-color: var(--burgundy);
      box-shadow: 0 0 0 3px rgba(114, 47, 55, 0.12);
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--burgundy);
      color: var(--cream);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: system-ui, -apple-system, sans-serif;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .msg {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.9rem;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.err { background: #fdeef0; color: #7a1f2a; display: block; }
    .msg.ok { background: #e8f5ee; color: #1f5c3a; display: block; }
    .hint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #7a7268;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.45;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <!-- Inline mark: swap for your hosted logo <img> if you prefer -->
      <svg width="48" height="48" viewBox="0 0 48 48" aria-hidden="true">
        <circle cx="24" cy="24" r="22" fill="#722f37" />
        <circle cx="24" cy="24" r="16" fill="none" stroke="#c89b3c" stroke-width="1.5" />
        <path d="M24 10 L26 22 L24 38 L22 22 Z" fill="#f5e9d3" opacity="0.95" />
        <path d="M10 24 L22 22 L38 24 L22 26 Z" fill="#f5e9d3" opacity="0.95" />
      </svg>
      <div>
        <h1>Venture Local</h1>
        <p>Set a new password for your account.</p>
      </div>
    </div>

    <div id="loading" class="hint">Checking your reset link…</div>

    <div id="msg" class="msg" role="alert"></div>

    <form id="form" class="hidden">
      <label for="p1">New password</label>
      <input id="p1" type="password" autocomplete="new-password" minlength="8" required />

      <label for="p2">Confirm password</label>
      <input id="p2" type="password" autocomplete="new-password" minlength="8" required />

      <button type="submit" id="btn">Update password</button>
    </form>

    <p id="done" class="hint hidden">You can close this page and sign in again in the Venture Local app.</p>
  </div>

  <script>
    // Direct GoTrue API flow (no SDK import) to avoid browser PKCE/session deadlocks.
    const SUPABASE_URL = "https://aqjuqjxmsanrmcpmaroj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxanVxanhtc2Fucm1jcG1hcm9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDY0MzksImV4cCI6MjA5MDkyMjQzOX0.xIohogrAEiXJf_pesu3UwUj59K26dpUzN6gZ_hdthxM";


    const loading = document.getElementById("loading");
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const done = document.getElementById("done");
    const btn = document.getElementById("btn");

    let accessToken = null;

    function showError(text) {
      msg.className = "msg err";
      msg.textContent = text;
    }

    function showOk(text) {
      msg.className = "msg ok";
      msg.textContent = text;
    }

    function hideLoading() {
      loading.classList.add("hidden");
    }

    function withTimeout(promise, ms, message) {
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          setTimeout(() => reject(new Error(message || "Request timed out.")), ms);
        }),
      ]);
    }

    function stripAuthFromUrl() {
      const u = new URL(window.location.href);
      u.searchParams.delete("token_hash");
      u.searchParams.delete("type");
      u.searchParams.delete("code");
      u.hash = "";
      window.history.replaceState({}, "", u.pathname + u.search + u.hash);
    }

    async function verifyRecoveryToken() {
      const url = new URL(window.location.href);
      const tokenHash = url.searchParams.get("token_hash");
      const type = url.searchParams.get("type");

      if (!tokenHash) {
        throw new Error("Open this page from your reset email link. Missing token_hash.");
      }
      if (type !== "recovery") {
        throw new Error("Invalid reset link type. Please request a new password reset email.");
      }

      const verifyURL = SUPABASE_URL.replace(/\/$/, "") + "/auth/v1/verify";
      const response = await withTimeout(
        fetch(verifyURL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({
            token_hash: tokenHash,
            type: "recovery",
          }),
        }),
        20000,
        "Timed out while validating reset link. Try again."
      );

      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.msg || payload.error_description || payload.error || "Reset link validation failed.");
      }

      accessToken = payload.access_token || (payload.session && payload.session.access_token) || null;
      if (!accessToken) {
        throw new Error("Reset link validated but no session token was returned.");
      }

      stripAuthFromUrl();
    }

    async function updatePassword(newPassword) {
      const userURL = SUPABASE_URL.replace(/\/$/, "") + "/auth/v1/user";
      const response = await withTimeout(
        fetch(userURL, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            apikey: SUPABASE_ANON_KEY,
            Authorization: "Bearer " + accessToken,
          },
          body: JSON.stringify({ password: newPassword }),
        }),
        20000,
        "Timed out while updating password. Try again."
      );

      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.msg || payload.error_description || payload.error || "Could not update password.");
      }
    }

    async function init() {
      if (SUPABASE_URL.includes("REPLACE_") || SUPABASE_ANON_KEY.includes("REPLACE_")) {
        loading.textContent =
          "This page still has placeholder credentials. Edit SUPABASE_URL and SUPABASE_ANON_KEY in this file, then redeploy.";
        loading.style.color = "#7a1f2a";
        return;
      }

      try {
        await verifyRecoveryToken();
        hideLoading();
        form.classList.remove("hidden");
      } catch (error) {
        hideLoading();
        showError(error instanceof Error ? error.message : String(error));
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const p1 = document.getElementById("p1").value;
      const p2 = document.getElementById("p2").value;
      if (p1 !== p2) {
        showError("Passwords do not match.");
        return;
      }
      if (p1.length < 8) {
        showError("Use at least 8 characters.");
        return;
      }
      if (!accessToken) {
        showError("Missing recovery session. Open a fresh reset link from your email.");
        return;
      }

      btn.disabled = true;
      try {
        await updatePassword(p1);
        form.classList.add("hidden");
        showOk("Password updated successfully.");
        done.classList.remove("hidden");
      } catch (error) {
        showError(error instanceof Error ? error.message : String(error));
      } finally {
        btn.disabled = false;
      }
    });

    init();
  </script>
</body>
</html>
