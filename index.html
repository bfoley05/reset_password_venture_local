<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Venture Local — Reset password</title>
  <style>
    :root {
      --burgundy: #722f37;
      --gold: #c89b3c;
      --cream: #f5e9d3;
      --ink: #2c241c;
      --paper: #faf6ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      background: linear-gradient(160deg, var(--cream) 0%, #e8dfd0 100%);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--paper);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(44, 36, 28, 0.12), 0 0 0 1px rgba(114, 47, 55, 0.08);
      padding: 32px 28px 36px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .brand svg { flex-shrink: 0; }
    .brand h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--burgundy);
      letter-spacing: 0.02em;
    }
    .brand p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: #5c5348;
      font-family: system-ui, -apple-system, sans-serif;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b5d4f;
      margin-bottom: 6px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(114, 47, 55, 0.35);
      font-size: 1rem;
      margin-bottom: 16px;
      background: #fff;
    }
    input:focus {
      outline: none;
      border-color: var(--burgundy);
      box-shadow: 0 0 0 3px rgba(114, 47, 55, 0.12);
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--burgundy);
      color: var(--cream);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: system-ui, -apple-system, sans-serif;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .msg {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.9rem;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.err { background: #fdeef0; color: #7a1f2a; display: block; }
    .msg.ok { background: #e8f5ee; color: #1f5c3a; display: block; }
    .hint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #7a7268;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.45;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <!-- Inline mark: swap for your hosted logo <img> if you prefer -->
      <svg width="48" height="48" viewBox="0 0 48 48" aria-hidden="true">
        <circle cx="24" cy="24" r="22" fill="#722f37" />
        <circle cx="24" cy="24" r="16" fill="none" stroke="#c89b3c" stroke-width="1.5" />
        <path d="M24 10 L26 22 L24 38 L22 22 Z" fill="#f5e9d3" opacity="0.95" />
        <path d="M10 24 L22 22 L38 24 L22 26 Z" fill="#f5e9d3" opacity="0.95" />
      </svg>
      <div>
        <h1>Venture Local</h1>
        <p>Set a new password for your account.</p>
      </div>
    </div>

    <div id="loading" class="hint">Checking your reset link…</div>

    <div id="msg" class="msg" role="alert"></div>

    <form id="form" class="hidden">
      <label for="p1">New password</label>
      <input id="p1" type="password" autocomplete="new-password" minlength="8" required />

      <label for="p2">Confirm password</label>
      <input id="p2" type="password" autocomplete="new-password" minlength="8" required />

      <button type="submit" id="btn">Update password</button>
    </form>

    <p id="done" class="hint hidden">You can close this page and sign in again in the Venture Local app.</p>
  </div>

  <script type="module">
    /**
     * Password reset from the iOS app uses PKCE. The default email link hits Supabase verify then
     * redirects with ?code=… which needs a code verifier only stored on the phone — the browser
     * never gets a session and getSession() can hang.
     *
     * Fix: In Supabase → Auth → Email Templates → Reset password, use a link that sends the user
     * straight here with token_hash + type (see reset-password-email-supabase.html), e.g.:
     *   href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=recovery"
     *
     * This page also supports implicit-style redirects (#access_token=…) via setSession.
     */
    const SUPABASE_URL = "https://aqjuqjxmsanrmcpmaroj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxanVxanhtc2Fucm1jcG1hcm9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDY0MzksImV4cCI6MjA5MDkyMjQzOX0.xIohogrAEiXJf_pesu3UwUj59K26dpUzN6gZ_hdthxM";

    const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2.49.1");
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      // We parse the URL explicitly (token_hash / hash tokens / ?code) to avoid PKCE deadlocks with Swift-initiated resets.
      auth: { detectSessionInUrl: false, persistSession: false },
    });

    const loading = document.getElementById("loading");
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const done = document.getElementById("done");
    const btn = document.getElementById("btn");

    function showError(text) {
      msg.className = "msg err";
      msg.textContent = text;
    }
    function showOk(text) {
      msg.className = "msg ok";
      msg.textContent = text;
    }

    function stripAuthFromUrl() {
      const u = new URL(window.location.href);
      u.searchParams.delete("token_hash");
      u.searchParams.delete("type");
      u.searchParams.delete("code");
      u.hash = "";
      window.history.replaceState({}, "", u.pathname + u.search + u.hash);
    }

    async function establishRecoverySession() {
      try {
        const url = new URL(window.location.href);
        const tokenHash = url.searchParams.get("token_hash");
        const type = url.searchParams.get("type");

        if (tokenHash && type) {
          const { error } = await supabase.auth.verifyOtp({
            type,
            token_hash: tokenHash,
          });
          if (error) return { error };
          stripAuthFromUrl();
          return { error: null };
        }

        const hashParams = new URLSearchParams(
          window.location.hash.startsWith("#") ? window.location.hash.slice(1) : ""
        );
        const accessToken = hashParams.get("access_token");
        const refreshToken = hashParams.get("refresh_token");
        if (accessToken && refreshToken) {
          const { error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          });
          if (error) return { error };
          stripAuthFromUrl();
          return { error: null };
        }

        const code = url.searchParams.get("code");
        if (code) {
          const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
          if (!error) {
            stripAuthFromUrl();
            return { error: null };
          }
          return {
            error: new Error(
              "This reset link can't complete in the browser (mobile app + email). Request a new reset email after updating the template—see Venture Local reset page instructions—or open the link on the same device where you tapped “Forgot password.”"
            ),
          };
        }

        const { error } = await supabase.auth.getSession();
        if (error) return { error };
        return { error: null };
      } catch (e) {
        return { error: e instanceof Error ? e : new Error(String(e)) };
      }
    }

    if (SUPABASE_URL.includes("REPLACE_") || SUPABASE_ANON_KEY.includes("REPLACE_")) {
      loading.textContent =
        "This page still has placeholder credentials. Edit SUPABASE_URL and SUPABASE_ANON_KEY in this file, then redeploy.";
      loading.style.color = "#7a1f2a";
    } else {
      const est = await establishRecoverySession();
      if (est.error) {
        loading.classList.add("hidden");
        showError(est.error.message || String(est.error));
        return;
      }

      const { data: { session }, error: sessErr } = await supabase.auth.getSession();
      loading.classList.add("hidden");
      if (sessErr) {
        showError(sessErr.message);
        return;
      }
      if (!session) {
        showError(
          "This link is invalid or has expired. Request a new reset from the Venture Local app."
        );
        return;
      }
      form.classList.remove("hidden");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const p1 = document.getElementById("p1").value;
        const p2 = document.getElementById("p2").value;
        if (p1 !== p2) {
          showError("Passwords do not match.");
          return;
        }
        if (p1.length < 8) {
          showError("Use at least 8 characters.");
          return;
        }
        btn.disabled = true;
        const { error: upErr } = await supabase.auth.updateUser({ password: p1 });
        btn.disabled = false;
        if (upErr) {
          showError(upErr.message);
          return;
        }
        form.classList.add("hidden");
        msg.className = "msg ok";
        msg.textContent = "Password updated successfully.";
        done.classList.remove("hidden");
        await supabase.auth.signOut();
      });
    }
  </script>
</body>
</html>
